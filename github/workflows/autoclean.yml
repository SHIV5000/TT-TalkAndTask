name: Auto-Clean Repository

on: 
  workflow_dispatch:

jobs:
  sweep-junk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Delete Unwanted Files
        run: |
          rm -f PROJECT_STATE.md
          rm -f .nojekyll
          echo "Junk files successfully deleted."

      - name: Save Clean Codebase
        run: |
          git config --global user.name "GitHub Auto-Cleaner"
          git config --global user.email "actions@github.com"
          git add -u
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-deleted unused files" && git push)
